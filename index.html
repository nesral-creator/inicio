<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi página de inicio</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --card-border: #1f2937;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 10px 24px 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 1100px;
    }

    header {
      margin-bottom: 10px;
      text-align: center;
    }

    /* Modificado para alinear el logo y el texto al centro */
    header h1 {
      font-size: 2.5rem;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px; /* Espacio entre el logo y el texto */
    }

    /* Estilos para el nuevo logo del header */
    .header-logo {
      width: 80px;  /* Ajusta el tamaño según te convenga */
      height: 80px;
      object-fit: contain;
    }

    header span {
      font-size: 0.9rem;
      color: var(--muted);
    }

    /* 🔍 BARRA DE BÚSQUEDA CENTRADA Y MÁS LARGA (SIN BOTÓN) */
    .search-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin: 22px 0 100px;
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      width: 100%;
      max-width: 600px;
    }

    .search-box input {
      padding: 12px 14px;
      background: transparent;
      border: none;
      color: var(--text);
      width: 100%;
      font-size: 1rem;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .group {
      background: linear-gradient(145deg, #020617, #020617);
      border-radius: 14px;
      border: 1px solid var(--card-border);
      padding: 14px 14px 10px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
    }

    .group-title {
      font-size: 1.0rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 1.0rem;
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
    }

    .link img.icon {
      width: 30px;
      height: 30px;
      object-fit: contain;
    }

    .link:hover {
      background: rgba(56, 189, 248, 0.12);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15,23,42,0.7);
    }

    footer {
      margin-top: 18px;
      text-align: right;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .search-box { max-width: 90%; }
      .header-logo { width: 32px; height: 32px; } /* Logo un poco más chico en móvil */
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header>
      <h1>
        <img class="header-logo" src="icons/Logo_nesral.png" alt="Logo">
        Nesral
      </h1>
      <span>Personaliza los enlaces editando este archivo HTML</span>
    </header>

    <div class="search-container">
      <form class="search-box" action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" placeholder="Buscar..." />
      </form>
    </div>

    <main class="grid">
      <section class="group">
        <h2 class="group-title">Trabajo</h2>
        <div class="links">
          <a class="link" href="https://mail.google.com" target="_blank">
            <img class="icon" src="icons/gmail.png" alt="Gmail">
            <span>Gmail</span>
          </a>
          <a class="link" href="https://drive.google.com" target="_blank">
            <img class="icon" src="icons/google-drive.png" alt="Drive">
            <span>Google Drive</span>
          </a>
          <a class="link" href="https://calendar.google.com" target="_blank">
            <img class="icon" src="icons/google-calendar.png" alt="Calendario">
            <span>Calendario</span>
          </a>
        </div>
      </section>

      <section class="group">
        <h2 class="group-title">Social</h2>
        <div class="links">
          <a class="link" href="https://web.whatsapp.com" target="_blank">
            <img class="icon" src="icons/whatsapp.png" alt="WhatsApp">
            <span>WhatsApp Web</span>
          </a>
          <a class="link" href="https://www.instagram.com" target="_blank">
            <img class="icon" src="icons/instagram.png" alt="Instagram">
            <span>Instagram</span>
          </a>
        </div>
      </section>

      <section class="group">
        <h2 class="group-title">Entretenimiento</h2>
        <div class="links">
          <a class="link" href="https://www.youtube.com" target="_blank">
            <img class="icon" src="icons/youtube.png" alt="YouTube">
            <span>YouTube</span>
          </a>
        </div>
      </section>

      <section class="group">
        <h2 class="group-title">Herramientas</h2>
        <div class="links">
          <a class="link" href="https://www.noip.com/es-MX/login?intended=&ref_url=console" target="_blank">
            <img class="icon" src="icons/no-ip.png" alt="No-ip">
            <span>No-ip</span>
          </a>
          <a class="link" href="https://chat.openai.com" target="_blank">
            <img class="icon" src="icons/chatgpt.png" alt="ChatGPT">
            <span>ChatGPT</span>
          </a>
          <a class="link" href="https://www.google.com" target="_blank">
            <img class="icon" src="icons/google.png" alt="Google">
            <span>Google</span>
          </a>
          <a class="link" href="https://speedtest.net" target="_blank">
            <img class="icon" src="icons/speedtest.png" alt="Speedtest">
            <span>Speedtest</span>
          </a>
        </div>
      </section>
    </main>

    <footer>
      Edita este archivo para cambiar grupos, iconos y enlaces.
    </footer>

  </div>
</body>
</html>
